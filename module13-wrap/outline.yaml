 - You know when a task beats a function, how fork-join shapes parallel activity
 - Point at the UVM block that would replace a flat initial block
 - That is SV testbench literacy
 notes: You can sketch a directed testbench with stimulus, observation, and self-check.
 You know when a task beats a function, how fork-join shapes parallel activity,
 and how a virtual interface wires a class to the DUT. You can read a simple constraint
 and cover hole, interpret overlapping versus next-cycle implication, and point
 at the UVM block that would replace a flat initial block. That is SV testbench
 literacy—not block sign-off, but vocabulary and judgment you keep into UVM, cocotb,
 or formal work.
