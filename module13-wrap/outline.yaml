 notes: 'If you leaned on browser labs, pick one module you skipped on the real shell
 track and run its examples check—or at least explain one prompt aloud without
 reading it. If you leaned on offline only, reopen one visual lab you avoided:
 cover bins, SVA timeline, or TB versus UVM map. Both tracks together beat either
 alone: sketches for speed, simulators for fidelity. Choose one weak skill, spend
 ten minutes, and teach it in two sentences to an imaginary teammate.'
