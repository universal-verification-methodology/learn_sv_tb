title: Fork / join
footer: learn_sv_tb — fork join
slides:
- type: title
  title: Fork / join
  subtitle: When a testbench needs parallel activity
  notes: When a testbench needs parallel activity — two stimulus threads, a monitor
    and a driver, or a timeout watchdog — you fork separate threads and then choose
    how the parent waits. Join waits until every child finishes. Join_any waits until
    the first child finishes; the others may keep running. Join_none does not wait
    at all — the parent continues immediately while children run in the background.
    This module is literacy for that timeline, not a full multi-agent UVM test yet.
- type: bullets
  title: When the parent resumes
  bullets:
  - 'Picture two forked threads: A takes thirty time units, B takes ten'
  - Under join, the parent resumes at thirty , the maximum
  - Under join_any, the parent resumes at ten , the minimum
  - Under join_none, the parent resumes at zero while both children continue
  - That difference drives real testbench structure
  notes: 'Picture two forked threads: A takes thirty time units, B takes ten. Under
    join, the parent resumes at thirty — the maximum. Under join_any, the parent resumes
    at ten — the minimum — and you must decide what to do with the slower thread still
    running. Under join_none, the parent resumes at zero while both children continue.
    That difference drives real testbench structure: join for clean shutdown, join_any
    for racing alternatives, join_none for fire-and-forget background monitors.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Browser lab starter
  notes: In the browser lab track, open the fork-and-join sketch from the tools page.
    Load the starter example with A at thirty and B at ten. Step simulation time and
    watch the parent state under join — it should stay waiting until both threads
    finish. Switch to join_any and see the parent resume when B completes first. Try
    join_none and confirm the parent moves on immediately. Use the challenge panel
    to predict resume times, then Check your answers.
- type: bullets
  title: Real SystemVerilog practice
  bullets:
  - In the real SystemVerilog track, open this module's examples prompts
  - Restate when you would pick each join flavor , all done, first done, or no wait
  - Sketch the fork block below on paper and write the resume time for each keyword
    with A
  - Optional stretch
  - '```systemverilog // fork-join , parent waits for ALL children (max time) fork
    begin #30'
  notes: "In the real SystemVerilog track, open this module's examples prompts. Restate\
    \ when you would pick each join flavor — all done, first done, or no wait. Sketch\
    \ the fork block below on paper and write the resume time for each keyword with\
    \ A equals thirty and B equals ten. Optional stretch: note what happens to the\
    \ slower thread after join_any if you disable fork.\n\n```systemverilog\n// fork-join\
    \ — parent waits for ALL children (max time)\nfork\n  begin #30; $display(\"A\
    \ done\"); end\n  begin #10; $display(\"B done\"); end\njoin\n$display(\"parent\
    \ resumes\");  // at t=30 under join\n\n// join_any — parent resumes at FIRST\
    \ finish (min time)\n// join_none — parent resumes immediately (t=0)\n```"
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not assume join_any stops the other threads
  - Do not use join_none when the parent must observe child results before continuing
  - Do not forget that resume time depends on the slowest or fastest child, not an
    average
  - And remember
  notes: 'Do not assume join_any stops the other threads — they may still run unless
    you explicitly disable them. Do not use join_none when the parent must observe
    child results before continuing — you need join or a handshake. Do not forget
    that resume time depends on the slowest or fastest child, not an average. And
    remember: the browser timeline is a sketch; real simulators still need proper
    variable scope and race-free communication between threads.'
- type: bullets
  title: Your turn
