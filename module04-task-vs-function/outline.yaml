title: Task vs function
footer: learn_sv_tb — task vs function
slides:
- type: title
 title: Task vs function
 subtitle: SystemVerilog gives you several procedural shapes, and they are not interchangeable
 notes: 'SystemVerilog gives you several procedural shapes, and they are not interchangeable.
 A task is a testbench helper that may consume simulation time — it can wait on
 a clock edge or a delay. A function is zero-time: it returns a value and cannot
 block. Always blocks live in RTL — always_ff for sequential logic, always_comb
 for combinational. This module is literacy for picking the right shape, not a
 full UVM environment yet.'
- type: bullets
 title: Timing, return, and synthesis
 bullets:
 - Here is the decision table in plain language
 - Tasks may use hash-delay and at-events
 - Functions must finish in zero simulation time and return a value
 - Always_ff and always_comb are for synthesizable RTL
 - The browser lab lets you flip between modes and see timing and synthesis roles
 side by
 notes: Here is the decision table in plain language. Tasks may use hash-delay and
 at-events; they do not return a value the way functions do — they drive signals
 or pass outputs through arguments. Functions must finish in zero simulation time
 and return a value; they are fine inside combinational always blocks when the
 logic is pure. Always_ff and always_comb are for synthesizable RTL — flip-flops
 and gates — not for ad-hoc testbench sequencing. The browser lab lets you flip
 between modes and see timing and synthesis roles side by side.
- type: image
 title: Browser lab
 image: assets/lab-starter.png
 caption: Browser lab starter
 notes: 'In the browser lab track, open the task-versus-function explorer from the
 tools page. Load the starter example and pick a mode — task, function, always_ff,
 or always_comb. Read the source panel and the role legend: timing yes or no, returns
 a value or not, synthesizable or simulation-only. Step the timeline for a task
 and watch simulation time advance; switch to function and see zero-time return.
 Work a few challenges on illegal timing inside functions, then use Check.'
