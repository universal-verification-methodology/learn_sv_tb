 - '```systemverilog // task , may wait'
 notes: "In the real SystemVerilog track, open this module's examples prompts. Restate\
 \ the core idea in one sentence — when you need to wait, use a task; when you\
 \ need a computed value with no delay, use a function; when you build hardware,\
 \ use always blocks. Sketch the four shapes on paper using the patterns below.\
 \ Optional stretch: mark which lines would fail synthesis if you moved them into\
 \ RTL.\n\n```systemverilog\n// task — may wait; drives pins over time\ntask automatic\
 \ drive_bit(input bit b);\n @(posedge clk);\n din <= b;\nendtask\n\n// function\
 \ — zero time; returns a value\nfunction automatic logic [7:0] add8(input logic\
 \ [7:0] a, b);\n return a + b;\nendfunction\n\n// always_ff — sequential RTL\
 \ (flip-flops)\nalways_ff @(posedge clk) q <= d;\n\n// always_comb — combinational\
 \ RTL\nalways_comb y = a & b;\n```"
- type: bullets
 title: Pitfalls to watch
 bullets:
 - Do not put hash-delay or at-events inside a function
 - Do not use a task where you only need a pure calculation
 - Tasks describe testbench procedures
 - And remember
 notes: 'Do not put hash-delay or at-events inside a function — that is illegal and
 simulators will reject it. Do not use a task where you only need a pure calculation
 — functions are clearer and synthesizable when the logic is combinational. Do
 not confuse always_ff with a task — always_ff describes hardware that updates
 on clock edges; tasks describe testbench procedures. And remember: the browser
 sketch is conceptual; real toolchains still need proper module boundaries and
 timing checks.'
